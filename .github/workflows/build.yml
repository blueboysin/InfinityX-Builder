
name: Compile Infinity-X 3.10 Android 16

on:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: ubuntu-22.04 # We go back to GitHub's free machine

    steps:
    - name: Get source from repository
      uses: actions/checkout@v4

    - name: Aggressive Free Space Purge
      run: |
        # Turn off swap and delete giant software environments we don't need
        sudo swapoff -a
        sudo rm -f /swapfile
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda /usr/libexec/docker
        docker rmi $(docker images -q) || true
        sudo apt-get clean
        echo "====================================="
        echo "Available storage after purging:"
        df -h /
        echo "====================================="

    - name: Install Android Build Dependencies and Repo Tool
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libssl-dev libxml2 libxml2-utils lzma x11proto-core-dev xsltproc unzip rsync schedtool squashfs-tools zip zlib1g-dev python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Run Build Core Process
      run: |
        cp munch.xml /tmp/munch.xml
        chmod +x build.sh
        bash build.sh

    - name: Save My Finished ROM File
      uses: actions/upload-artifact@v4
      with:
        name: POCO-F4-Infinity-16-Zip
        path: ~/android/out/target/product/munch/Project_Infinity-X-*.zip
